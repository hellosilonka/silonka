<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <!-- Primary Meta Tags (defaults — overridden per-page by react-helmet-async) -->
  <title>Silonka | Premium Ceylon Spices from Sri Lanka</title>
  <meta name="description"
    content="Premium single-origin Ceylon spices — Black Pepper, Cinnamon, Cloves. Harvested at peak aroma from Sri Lanka's hill country. Shop online or order wholesale." />
  <meta name="keywords"
    content="Ceylon spices, Sri Lanka spices, Ceylon cinnamon, black pepper, cloves, organic spices, single origin spices, wholesale spices, Silonka" />
  <meta name="author" content="Silonka" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#1a1a18" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://silonka.com/" />
  <meta property="og:title" content="Silonka | Ceylon Spices from Sri Lanka" />
  <meta property="og:description"
    content="Premium single-origin Ceylon spices — Black Pepper, Cinnamon, Cloves. Harvested at peak aroma from Sri Lanka's hill country." />
  <meta property="og:image" content="https://silonka.com/hero_spice_field.jpg" />
  <meta property="og:site_name" content="Silonka" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://silonka.com/" />
  <meta name="twitter:title" content="Silonka | Ceylon Spices from Sri Lanka" />
  <meta name="twitter:description"
    content="Premium single-origin Ceylon spices — Black Pepper, Cinnamon, Cloves. Harvested at peak aroma from Sri Lanka's hill country." />
  <meta name="twitter:image" content="https://silonka.com/hero_spice_field.jpg" />

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Non-blocking font loading: swap display ensures text is visible immediately -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet">
  </noscript>

  <!-- Preload hero image for LCP -->
  <link rel="preload" as="image" href="/hero_spice_field.jpg" />

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Silonka",
    "url": "https://silonka.com",
    "logo": "https://silonka.com/favicon.png",
    "description": "Premium single-origin Ceylon spices sourced directly from Sri Lanka's hill country.",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Colombo",
      "addressCountry": "LK"
    },
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+94-76-695-1393",
      "email": "hello@silonka.com",
      "contactType": "customer service",
      "availableLanguage": ["English"]
    }
  }
  </script>

  <!-- Structured Data: WebSite with Search -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Silonka",
    "url": "https://silonka.com",
    "description": "Premium single-origin Ceylon spices from Sri Lanka",
    "publisher": {
      "@type": "Organization",
      "name": "Silonka"
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
